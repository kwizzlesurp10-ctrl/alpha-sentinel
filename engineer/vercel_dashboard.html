<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Factory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Vercel Factory Monitor</h1>
            <button class="bg-white text-black px-4 py-2 rounded-full font-bold">Deploy Agent</button>
        </header>
        
        <div class="grid grid-cols-3 gap-6">
            <div class="border border-neutral-800 p-6 rounded-lg bg-neutral-900">
                <h2 class="text-neutral-400">Deployments</h2>
                <p class="text-4xl font-bold">12</p>
            </div>
            <div class="border border-neutral-800 p-6 rounded-lg bg-neutral-900">
                <h2 class="text-neutral-400">Live URL</h2>
                <a href="https://alpha-sentinel-xi.vercel.app" class="text-blue-400 hover:underline break-all">alpha-sentinel-xi.vercel.app</a>
            </div>
            <div class="border border-neutral-800 p-6 rounded-lg bg-neutral-900">
                <h2 class="text-neutral-400">Cost (Est)</h2>
                <p class="text-4xl font-bold">$2.40</p>
            </div>
        </div>
    </div>
</body>
</html>
